name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed only to create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint + validate
        run: npm run check

      - name: Build extension .zip
        run: npx web-ext build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: build/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        # Pinned to v3.0.1 by commit SHA (third-party action).
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: build/*.zip
