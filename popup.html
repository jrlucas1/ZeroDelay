<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <script src="popup.js" type="module"></script>
    <title>ZeroDelay</title>
</head>

<body>
    <main id="app" class="app">
        <header class="app-header">
            <div class="brand">
                <span class="brand-dot" aria-hidden="true"></span>
                <div class="brand-text">
                    <h1 id="brand-name" class="brand-name"></h1>
                    <p id="brand-tagline" class="brand-tagline"></p>
                </div>
            </div>
        </header>

        <section class="modes" aria-labelledby="modes-title">
            <h2 id="modes-title" class="section-title"></h2>
            <div id="mode-cards" class="mode-cards" role="radiogroup"></div>
            <p id="mode-warning" class="mode-warning" hidden></p>
            <p id="modes-note" class="modes-note"></p>
        </section>

        <section class="advanced">
            <button id="advanced-toggle" class="advanced-toggle" type="button" aria-expanded="false">
                <span id="advanced-label" class="advanced-label"></span>
                <svg class="chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <div id="advanced-panel" class="advanced-panel" hidden>
                <div class="group">
                    <div id="indicator-rows" class="rows"></div>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <button id="reset" class="reset" type="button">
                <span id="reset-label" class="reset-label"></span>
                <span class="reset-fill" aria-hidden="true"></span>
            </button>
        </footer>
    </main>
</body>

</html>
